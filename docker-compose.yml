services:
  dev:
    build: .
    image: receitas-app-dev:${APP_VERSION:-latest}
    container_name: receitas_app_dev
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      DATABASE_PATH: /data/receitas_dev.db
      SECRET_KEY: ${SECRET_KEY:-receitas-app-dev-secret}
    ports:
      - "5002:5000"
    volumes:
      - .:/app
      - dev_data:/data
    command: flask --app app run --host 0.0.0.0 --port 5000 --debug

volumes:
  dev_data:
