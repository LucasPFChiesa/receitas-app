services:
  dev:
    build: .
    image: receitas-app-dev:${APP_VERSION:-latest}
    container_name: receitas_app_dev
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      DATABASE_PATH: /data/receitas_dev.db
      SECRET_KEY: ${DEV_SECRET_KEY:-dev-chave-local}
    ports:
      - "5002:5000"
    volumes:
      - .:/app
      - dev_data:/data
    command: flask --app app run --host 0.0.0.0 --port 5000 --debug

  homolog:
    build: .
    image: receitas-app:${APP_VERSION:-latest}
    container_name: receitas_app_homolog
    restart: unless-stopped
    environment:
      FLASK_ENV: homolog
      DATABASE_PATH: /data/receitas.db
      SECRET_KEY: ${HOMOLOG_SECRET_KEY:-homolog-chave-altere}
    ports:
      - "5001:5000"
    volumes:
      - homolog_data:/data

  prod:
    image: receitas-app:${APP_VERSION:-latest}
    container_name: receitas_app_prod
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      DATABASE_PATH: /data/receitas.db
      SECRET_KEY: ${PROD_SECRET_KEY:-producao-chave-altere}
    ports:
      - "5000:5000"
    volumes:
      - prod_data:/data
    profiles:
      - prod

volumes:
  dev_data:
  homolog_data:
  prod_data:
