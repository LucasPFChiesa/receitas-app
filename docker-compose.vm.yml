services:
  homolog:
    image: ${APP_IMAGE:-receitas-app:manual}
    container_name: receitas_app_homolog
    restart: unless-stopped
    environment:
      FLASK_ENV: homolog
      DATABASE_PATH: /data/receitas_homolog.db
    ports:
      - "5001:5000"
    volumes:
      - homolog_data:/data

  prod:
    image: ${APP_IMAGE:-receitas-app:manual}
    container_name: receitas_app_prod
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      DATABASE_PATH: /data/receitas_prod.db
    ports:
      - "5000:5000"
    volumes:
      - prod_data:/data
    profiles:
      - prod

volumes:
  homolog_data:
  prod_data:
