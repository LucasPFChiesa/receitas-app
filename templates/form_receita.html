{% extends 'base.html' %}
{% block conteudo %}
<section class="card">
    <h2>{{ acao }}</h2>
    <form method="post" class="formulario grid-form">
        <label>Nome
            <input type="text" name="nome" value="{{ receita['nome'] if receita else '' }}" required>
        </label>
        <label>Data de registro
            <input type="date" name="data_registro" value="{{ receita['data_registro'] if receita else '' }}" required>
        </label>
        <label class="col-span-2">Descrição
            <textarea name="descricao" rows="4" required>{{ receita['descricao'] if receita else '' }}</textarea>
        </label>
        <label>Custo
            <input type="number" step="0.01" min="0" name="custo" value="{{ receita['custo'] if receita else '' }}" required>
        </label>
        <label>Tipo da receita
            <select name="tipo_receita" required>
                <option value="">Selecione</option>
                <option value="doce" {% if receita and receita['tipo_receita'] == 'doce' %}selected{% endif %}>Doce</option>
                <option value="salgada" {% if receita and receita['tipo_receita'] == 'salgada' %}selected{% endif %}>Salgada</option>
            </select>
        </label>
        <div class="col-span-2 botoes-form">
            <button type="submit">Salvar</button>
            <a href="{{ url_for('listar_receitas') }}" class="btn-sec">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
