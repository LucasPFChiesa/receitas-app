name: Rollback Producao

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: "SHA da imagem ja aprovada para voltar em producao"
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  rollback-producao:
    name: Rollback producao
    runs-on: [self-hosted, receitas-app-vm]
    environment:
      name: production
      url: http://177.44.248.83:5000

    steps:
      - name: Baixar codigo do workflow
        uses: actions/checkout@v4

      - name: Aplicar rollback
        run: |
          set -e
          export COMPOSE_PROJECT_NAME=receitas-app
          export APP_IMAGE="ghcr.io/lucaspfchiesa/receitas-app:${{ inputs.image_sha }}"

          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          sudo docker pull "$APP_IMAGE"

          sudo docker ps -aq --filter "name=receitas_app_prod" \
            | xargs -r sudo docker rm -f

          if sudo -n docker compose version >/dev/null 2>&1; then
            sudo env COMPOSE_PROJECT_NAME="$COMPOSE_PROJECT_NAME" APP_IMAGE="$APP_IMAGE" \
              docker compose -f docker-compose.vm.yml --profile prod up -d prod
          else
            sudo env COMPOSE_PROJECT_NAME="$COMPOSE_PROJECT_NAME" APP_IMAGE="$APP_IMAGE" \
              docker-compose -f docker-compose.vm.yml --profile prod up -d prod
          fi

          python3 - <<'PY'
          import sys
          import time
          import urllib.request

          url = "http://127.0.0.1:5000/login"
          for _ in range(30):
              try:
                  with urllib.request.urlopen(url, timeout=3) as response:
                      if response.status == 200:
                          sys.exit(0)
              except Exception:
                  time.sleep(2)
          print("Rollback falhou: producao nao respondeu em http://127.0.0.1:5000/login", file=sys.stderr)
          sys.exit(1)
          PY
