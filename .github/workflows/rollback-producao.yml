name: Rollback Producao

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: "SHA da imagem ja aprovada para voltar em producao"
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  rollback-producao:
    name: Rollback producao
    runs-on: [self-hosted, receitas-app-vm]
    environment:
      name: production
      url: http://177.44.248.83:5000

    steps:
      - name: Aplicar rollback
        run: |
          set -e
          export APP_IMAGE="ghcr.io/lucaspfchiesa/receitas-app:${{ inputs.image_sha }}"
          export RUNTIME_DIR="$HOME/receitas-runtime"

          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          mkdir -p "$RUNTIME_DIR"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${{ github.repository }}/contents/runtime/start.sh?ref=${{ github.sha }}" \
            -o "$RUNTIME_DIR/start.sh"
          chmod +x "$RUNTIME_DIR/start.sh"

          bash "$RUNTIME_DIR/start.sh" \
            --non-interactive \
            --skip-runner \
            --image "$APP_IMAGE" \
            --only prod \
            --runtime-dir "$RUNTIME_DIR"
