name: Integracao

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  linter-messdetector-testes:
    name: Linter, mess detector e testes
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Linter
        run: pyflakes app.py init_db.py tests

      - name: Mess detector
        run: |
          radon cc app.py init_db.py tests -s -a
          radon mi app.py init_db.py tests -s

      - name: Testes
        run: pytest -q

      - name: Validar build Docker
        run: docker build -t receitas-app:ci .
