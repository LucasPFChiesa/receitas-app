name: Integracao

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      ambiente:
        description: "Ambiente para atualizar"
        required: true
        type: choice
        options:
          - homologacao
          - producao

jobs:
  linter-messdetector-testes:
    name: Linter, mess detector e testes
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Linter
        run: pyflakes app.py init_db.py tests

      - name: Mess detector
        run: |
          radon cc app.py init_db.py tests -s -a
          radon mi app.py init_db.py tests -s

      - name: Testes
        run: pytest -q

      - name: Validar build Docker
        run: docker build -t receitas-app:ci .

  deploy-homologacao:
    name: Atualizar homologacao
    runs-on: self-hosted
    needs: linter-messdetector-testes
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/configurando-com-docker') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.ambiente == 'homologacao')

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Atualizar pasta da aplicacao
        run: |
          tar \
            --exclude='.git' \
            --exclude='.pytest_cache' \
            --exclude='__pycache__' \
            --exclude='*/__pycache__' \
            --exclude='receitas.db' \
            --exclude='output.log' \
            -czf /tmp/receitas-app.tgz .
          rm -rf ~/receitas-app.new
          mkdir -p ~/receitas-app.new
          tar -xzf /tmp/receitas-app.tgz -C ~/receitas-app.new
          rm -rf ~/receitas-app
          mv ~/receitas-app.new ~/receitas-app
          chmod +x ~/receitas-app/docker-entrypoint.sh ~/receitas-app/scripts/*.sh

      - name: Subir homologacao
        run: |
          cd ~/receitas-app
          sh scripts/subir_homologacao.sh

  deploy-producao:
    name: Atualizar producao
    runs-on: self-hosted
    needs: linter-messdetector-testes
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.ambiente == 'producao'

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Atualizar pasta da aplicacao
        run: |
          tar \
            --exclude='.git' \
            --exclude='.pytest_cache' \
            --exclude='__pycache__' \
            --exclude='*/__pycache__' \
            --exclude='receitas.db' \
            --exclude='output.log' \
            -czf /tmp/receitas-app.tgz .
          rm -rf ~/receitas-app.new
          mkdir -p ~/receitas-app.new
          tar -xzf /tmp/receitas-app.tgz -C ~/receitas-app.new
          rm -rf ~/receitas-app
          mv ~/receitas-app.new ~/receitas-app
          chmod +x ~/receitas-app/docker-entrypoint.sh ~/receitas-app/scripts/*.sh

      - name: Subir producao
        run: |
          cd ~/receitas-app
          sh scripts/subir_producao.sh
