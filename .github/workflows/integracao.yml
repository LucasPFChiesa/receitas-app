name: Integracao

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      ambiente:
        description: "Ambiente para atualizar"
        required: true
        type: choice
        options:
          - homologacao
          - producao

jobs:
  linter-messdetector-testes:
    name: Linter, mess detector e testes
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Linter
        run: pyflakes app.py init_db.py tests

      - name: Mess detector
        run: |
          radon cc app.py init_db.py tests -s -a
          radon mi app.py init_db.py tests -s

      - name: Testes
        run: pytest -q

      - name: Validar build Docker
        run: docker build -t receitas-app:ci .

  deploy-homologacao:
    name: Atualizar homologacao
    runs-on: ubuntu-latest
    needs: linter-messdetector-testes
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/configurando-com-docker') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.ambiente == 'homologacao')

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar SSH
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          test -n "$VM_HOST"
          test -n "$VM_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s' "$VM_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Enviar projeto para VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          tar \
            --exclude='.git' \
            --exclude='.pytest_cache' \
            --exclude='__pycache__' \
            --exclude='*/__pycache__' \
            --exclude='receitas.db' \
            --exclude='output.log' \
            -czf /tmp/receitas-app.tgz .
          scp -o StrictHostKeyChecking=no -o ServerAliveInterval=30 /tmp/receitas-app.tgz "$VM_USER@$VM_HOST:/tmp/receitas-app.tgz"
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 "$VM_USER@$VM_HOST" '
            rm -rf ~/receitas-app.new &&
            mkdir -p ~/receitas-app.new &&
            tar -xzf /tmp/receitas-app.tgz -C ~/receitas-app.new &&
            rm -rf ~/receitas-app &&
            mv ~/receitas-app.new ~/receitas-app &&
            chmod +x ~/receitas-app/docker-entrypoint.sh ~/receitas-app/scripts/*.sh
          '

      - name: Subir homologacao
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 "$VM_USER@$VM_HOST" '
            cd ~/receitas-app &&
            sh scripts/subir_homologacao.sh
          '

  deploy-producao:
    name: Atualizar producao
    runs-on: ubuntu-latest
    needs: linter-messdetector-testes
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.ambiente == 'producao'

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar SSH
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          test -n "$VM_HOST"
          test -n "$VM_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s' "$VM_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Enviar projeto para VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          tar \
            --exclude='.git' \
            --exclude='.pytest_cache' \
            --exclude='__pycache__' \
            --exclude='*/__pycache__' \
            --exclude='receitas.db' \
            --exclude='output.log' \
            -czf /tmp/receitas-app.tgz .
          scp -o StrictHostKeyChecking=no -o ServerAliveInterval=30 /tmp/receitas-app.tgz "$VM_USER@$VM_HOST:/tmp/receitas-app.tgz"
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 "$VM_USER@$VM_HOST" '
            rm -rf ~/receitas-app.new &&
            mkdir -p ~/receitas-app.new &&
            tar -xzf /tmp/receitas-app.tgz -C ~/receitas-app.new &&
            rm -rf ~/receitas-app &&
            mv ~/receitas-app.new ~/receitas-app &&
            chmod +x ~/receitas-app/docker-entrypoint.sh ~/receitas-app/scripts/*.sh
          '

      - name: Subir producao
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 "$VM_USER@$VM_HOST" '
            cd ~/receitas-app &&
            sh scripts/subir_producao.sh
          '
