name: CI e Homologacao

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  packages: write

env:
  APP_IMAGE: ghcr.io/lucaspfchiesa/receitas-app:${{ github.sha }}

jobs:
  linter-messdetector-testes:
    name: Validar codigo
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Linter
        run: pyflakes app.py init_db.py tests

      - name: Mess detector
        run: |
          if [ -n "$(radon cc app.py init_db.py tests -s -n C)" ]; then
            radon cc app.py init_db.py tests -s -n C
            exit 1
          fi
          radon cc app.py init_db.py tests -s -a
          radon mi app.py init_db.py tests -s

      - name: Testes
        run: pytest -q

      - name: Validar build Docker
        run: docker build -t "$APP_IMAGE" .

      - name: Login no GHCR
        if: github.event_name == 'push'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publicar imagem do commit
        if: github.event_name == 'push'
        run: docker push "$APP_IMAGE"

  deploy-homologacao:
    name: Deploy homologacao
    needs: linter-messdetector-testes
    runs-on: [self-hosted, receitas-app-vm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/integracao'
    environment:
      name: homologacao
      url: http://177.44.248.83:5001

    steps:
      - name: Atualizar homologacao
        run: |
          set -e
          export APP_IMAGE="${{ env.APP_IMAGE }}"
          export RUNTIME_DIR="$HOME/receitas-runtime"

          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          mkdir -p "$RUNTIME_DIR"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${{ github.repository }}/contents/runtime/start.sh?ref=${{ github.sha }}" \
            -o "$RUNTIME_DIR/start.sh"
          chmod +x "$RUNTIME_DIR/start.sh"

          bash "$RUNTIME_DIR/start.sh" \
            --non-interactive \
            --skip-runner \
            --image "$APP_IMAGE" \
            --only homolog \
            --runtime-dir "$RUNTIME_DIR"
