name: CI e Homologacao

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  linter-messdetector-testes:
    name: Validar codigo
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Linter
        run: pyflakes app.py init_db.py tests

      - name: Mess detector
        run: |
          if [ -n "$(radon cc app.py init_db.py tests -s -n C)" ]; then
            radon cc app.py init_db.py tests -s -n C
            exit 1
          fi
          radon cc app.py init_db.py tests -s -a
          radon mi app.py init_db.py tests -s

      - name: Testes
        run: pytest -q

      - name: Validar build Docker
        run: docker build -t receitas-app:ci .

  deploy-homologacao:
    name: Deploy homologacao
    needs: linter-messdetector-testes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/configurando-com-docker'
    environment:
      name: homologacao
      url: http://177.44.248.83:5001

    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_vm
          chmod 600 ~/.ssh/id_vm

      - name: Atualizar homologacao na VM
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          cat > /tmp/deploy_homologacao.sh <<'EOF'
          set -e
          cd /home/univates/receitas-app
          GITHUB_TOKEN_FILE="$HOME/keys/github_token.txt"
          if [ -s "$GITHUB_TOKEN_FILE" ]; then
            ASKPASS="$(mktemp)"
            trap 'rm -f "$ASKPASS"' EXIT
            cat > "$ASKPASS" <<'ASKPASS_EOF'
          #!/bin/sh
          case "$1" in
            *Username*) printf '%s\n' 'x-access-token' ;;
            *Password*) tr -d '\r\n' < "$HOME/keys/github_token.txt" ;;
          esac
          ASKPASS_EOF
            chmod 700 "$ASKPASS"
            GIT_ASKPASS="$ASKPASS" GIT_TERMINAL_PROMPT=0 git fetch origin configurando-com-docker
          else
            git fetch origin configurando-com-docker
          fi
          git checkout --detach "$DEPLOY_SHA"

          if docker compose version >/dev/null 2>&1; then
            docker compose -f docker-compose.vm.yml up -d --build homolog
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose -f docker-compose.vm.yml up -d --build homolog
          elif sudo -n docker compose version >/dev/null 2>&1; then
            sudo docker compose -f docker-compose.vm.yml up -d --build homolog
          else
            sudo docker-compose -f docker-compose.vm.yml up -d --build homolog
          fi
          EOF

          for attempt in 1 2 3 4 5; do
            if ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -i ~/.ssh/id_vm "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" "DEPLOY_SHA='${DEPLOY_SHA}' bash -s" < /tmp/deploy_homologacao.sh; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          exit 1
