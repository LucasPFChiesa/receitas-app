name: CI e Homologacao

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  packages: write

env:
  APP_IMAGE: ghcr.io/lucaspfchiesa/receitas-app:${{ github.sha }}

jobs:
  linter-messdetector-testes:
    name: Validar codigo
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Linter
        run: pyflakes app.py init_db.py tests

      - name: Mess detector
        run: |
          if [ -n "$(radon cc app.py init_db.py tests -s -n C)" ]; then
            radon cc app.py init_db.py tests -s -n C
            exit 1
          fi
          radon cc app.py init_db.py tests -s -a
          radon mi app.py init_db.py tests -s

      - name: Testes
        run: pytest -q

      - name: Validar build Docker
        run: docker build -t "$APP_IMAGE" .

      - name: Login no GHCR
        if: github.event_name == 'push'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publicar imagem do commit
        if: github.event_name == 'push'
        run: docker push "$APP_IMAGE"

  deploy-homologacao:
    name: Deploy homologacao
    needs: linter-messdetector-testes
    runs-on: [self-hosted, receitas-app-vm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/integracao'
    environment:
      name: homologacao
      url: http://177.44.248.83:5001

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Atualizar homologacao
        run: |
          set -e
          export COMPOSE_PROJECT_NAME=receitas-app
          export APP_IMAGE="${{ env.APP_IMAGE }}"

          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          sudo docker pull "$APP_IMAGE"

          sudo docker ps -aq --filter "name=receitas_app_homolog" \
            | xargs -r sudo docker rm -f

          if sudo -n docker compose version >/dev/null 2>&1; then
            sudo env COMPOSE_PROJECT_NAME="$COMPOSE_PROJECT_NAME" APP_IMAGE="$APP_IMAGE" \
              docker compose -f docker-compose.vm.yml up -d homolog
          else
            sudo env COMPOSE_PROJECT_NAME="$COMPOSE_PROJECT_NAME" APP_IMAGE="$APP_IMAGE" \
              docker-compose -f docker-compose.vm.yml up -d homolog
          fi

          python3 - <<'PY'
          import sys
          import time
          import urllib.request

          url = "http://127.0.0.1:5001/login"
          for _ in range(30):
              try:
                  with urllib.request.urlopen(url, timeout=3) as response:
                      if response.status == 200:
                          sys.exit(0)
              except Exception:
                  time.sleep(2)
          print("Homologacao nao respondeu em http://127.0.0.1:5001/login", file=sys.stderr)
          sys.exit(1)
          PY

          CURRENT_IMAGES="$(sudo docker ps --format '{{.Image}}' | sort -u)"
          sudo docker images "ghcr.io/lucaspfchiesa/receitas-app" --format '{{.Repository}}:{{.Tag}}' \
            | while read -r IMAGE; do
                [ -z "$IMAGE" ] && continue
                [ "$IMAGE" = "$APP_IMAGE" ] && continue
                echo "$CURRENT_IMAGES" | grep -qx "$IMAGE" && continue
                sudo docker rmi "$IMAGE" || true
              done
