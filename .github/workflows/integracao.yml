name: CI e Homologacao

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  linter-messdetector-testes:
    name: Validar codigo
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Linter
        run: pyflakes app.py init_db.py tests

      - name: Mess detector
        run: |
          if [ -n "$(radon cc app.py init_db.py tests -s -n C)" ]; then
            radon cc app.py init_db.py tests -s -n C
            exit 1
          fi
          radon cc app.py init_db.py tests -s -a
          radon mi app.py init_db.py tests -s

      - name: Testes
        run: pytest -q

      - name: Validar build Docker
        run: docker build -t receitas-app:ci .

  deploy-homologacao:
    name: Deploy homologacao
    needs: linter-messdetector-testes
    runs-on: [self-hosted, receitas-app-vm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/configurando-com-docker'
    environment:
      name: homologacao
      url: http://177.44.248.83:5001

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Atualizar homologacao
        run: |
          set -e
          export COMPOSE_PROJECT_NAME=receitas-app

          sudo docker ps -aq --filter "name=receitas_app_homolog" \
            | xargs -r sudo docker rm -f

          if sudo -n docker compose version >/dev/null 2>&1; then
            sudo docker compose -f docker-compose.vm.yml up -d --build homolog
          else
            sudo docker-compose -f docker-compose.vm.yml up -d --build homolog
          fi

  deploy-producao:
    name: Aprovar deploy producao
    needs: deploy-homologacao
    runs-on: [self-hosted, receitas-app-vm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/configurando-com-docker'
    environment:
      name: production
      url: http://177.44.248.83:5000

    steps:
      - name: Baixar codigo aprovado
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Atualizar producao
        run: |
          set -e
          export COMPOSE_PROJECT_NAME=receitas-app

          sudo docker ps -aq --filter "name=receitas_app_prod" \
            | xargs -r sudo docker rm -f

          if sudo -n docker compose version >/dev/null 2>&1; then
            sudo docker compose -f docker-compose.vm.yml --profile prod up -d --build prod
          else
            sudo docker-compose -f docker-compose.vm.yml --profile prod up -d --build prod
          fi
