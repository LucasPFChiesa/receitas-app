name: Promover Integracao para Producao

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  IMAGE_REPOSITORY: ghcr.io/lucaspfchiesa/receitas-app

jobs:
  preparar-promocao:
    name: Verificar versao da integracao
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ steps.versao.outputs.image_sha }}

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar branch integracao
        id: versao
        run: |
          set -e
          git fetch origin main integracao

          if ! git merge-base --is-ancestor origin/main origin/integracao; then
            echo "A branch integracao nao contem a main atual." >&2
            echo "Atualize integracao com main antes de promover para producao." >&2
            exit 1
          fi

          IMAGE_SHA="$(git rev-parse origin/integracao)"
          echo "image_sha=$IMAGE_SHA" >> "$GITHUB_OUTPUT"
          echo "Imagem que sera promovida: $IMAGE_REPOSITORY:$IMAGE_SHA"

      - name: Login no GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Confirmar que a imagem existe
        run: docker manifest inspect "$IMAGE_REPOSITORY:${{ steps.versao.outputs.image_sha }}"

  aprovar-e-mergear:
    name: Aprovar e mergear integracao na main
    needs: preparar-promocao
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Avancar main para integracao
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main integracao
          git checkout main
          git merge --ff-only origin/integracao
          git push origin HEAD:main

  deploy-producao:
    name: Atualizar producao
    needs:
      - preparar-promocao
      - aprovar-e-mergear
    runs-on: [self-hosted, receitas-app-vm]

    steps:
      - name: Atualizar producao
        run: |
          set -e
          export APP_IMAGE="${{ env.IMAGE_REPOSITORY }}:${{ needs.preparar-promocao.outputs.image_sha }}"
          export RUNTIME_DIR="$HOME/receitas-runtime"

          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          mkdir -p "$RUNTIME_DIR"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${{ github.repository }}/contents/runtime/start.sh?ref=${{ needs.preparar-promocao.outputs.image_sha }}" \
            -o "$RUNTIME_DIR/start.sh"
          chmod +x "$RUNTIME_DIR/start.sh"

          bash "$RUNTIME_DIR/start.sh" \
            --non-interactive \
            --skip-runner \
            --image "$APP_IMAGE" \
            --only prod \
            --runtime-dir "$RUNTIME_DIR"
