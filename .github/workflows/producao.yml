name: Deploy Producao

on:
  workflow_run:
    workflows:
      - CI e Homologacao
    types:
      - completed
    branches:
      - configurando-com-docker

jobs:
  deploy-producao:
    name: Aprovar deploy producao
    runs-on: [self-hosted, receitas-app-vm]
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    environment:
      name: production
      url: http://177.44.248.83:5000

    steps:
      - name: Baixar codigo aprovado
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Atualizar producao
        run: |
          set -e
          export COMPOSE_PROJECT_NAME=receitas-app

          sudo docker ps -aq --filter "name=receitas_app_prod" \
            | xargs -r sudo docker rm -f

          if sudo -n docker compose version >/dev/null 2>&1; then
            sudo docker compose -f docker-compose.vm.yml --profile prod up -d --build prod
          else
            sudo docker-compose -f docker-compose.vm.yml --profile prod up -d --build prod
          fi
