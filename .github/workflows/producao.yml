name: Deploy Producao

on:
  workflow_run:
    workflows:
      - CI e Homologacao
    types:
      - completed
    branches:
      - configurando-com-docker

jobs:
  deploy-producao:
    name: Aprovar deploy producao
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    environment:
      name: production
      url: http://177.44.248.83:5000

    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_vm
          chmod 600 ~/.ssh/id_vm

      - name: Atualizar producao na VM
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          cat > /tmp/deploy_producao.sh <<'EOF'
          set -e
          cd /home/univates/receitas-app
          GITHUB_TOKEN_FILE="$HOME/keys/github_token.txt"
          if [ -s "$GITHUB_TOKEN_FILE" ]; then
            ASKPASS="$(mktemp)"
            trap 'rm -f "$ASKPASS"' EXIT
            cat > "$ASKPASS" <<'ASKPASS_EOF'
          #!/bin/sh
          case "$1" in
            *Username*) printf '%s\n' 'x-access-token' ;;
            *Password*) tr -d '\r\n' < "$HOME/keys/github_token.txt" ;;
          esac
          ASKPASS_EOF
            chmod 700 "$ASKPASS"
            GIT_ASKPASS="$ASKPASS" GIT_TERMINAL_PROMPT=0 git fetch origin configurando-com-docker
          else
            git fetch origin configurando-com-docker
          fi
          git checkout --detach "$DEPLOY_SHA"
          if docker ps >/dev/null 2>&1; then
            docker ps -aq --filter "name=receitas_app_prod" | xargs -r docker rm -f
          elif sudo -n docker ps >/dev/null 2>&1; then
            sudo docker ps -aq --filter "name=receitas_app_prod" | xargs -r sudo docker rm -f
          fi

          if docker ps >/dev/null 2>&1; then
            if docker compose version >/dev/null 2>&1; then
              docker compose -f docker-compose.vm.yml --profile prod up -d --build prod
            else
              docker-compose -f docker-compose.vm.yml --profile prod up -d --build prod
            fi
          elif sudo -n docker ps >/dev/null 2>&1; then
            if sudo -n docker compose version >/dev/null 2>&1; then
              sudo docker compose -f docker-compose.vm.yml --profile prod up -d --build prod
            else
              sudo docker-compose -f docker-compose.vm.yml --profile prod up -d --build prod
            fi
          else
            echo "Sem permissao para acessar Docker"
            exit 1
          fi
          EOF

          for attempt in 1 2 3 4 5; do
            if ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -i ~/.ssh/id_vm "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" "DEPLOY_SHA='${DEPLOY_SHA}' bash -s" < /tmp/deploy_producao.sh; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          exit 1
